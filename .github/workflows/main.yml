name: ruby
"on":
  push:
    branches:
      - master
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby
    steps:
      - uses: actions/checkout@v6
      - name: remove Gemfile.lock
        run: |
          rm Gemfile.lock
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Run the default task
        run: bundle exec rake
